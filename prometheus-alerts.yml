groups:
  - name: document_edit_system
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="document-edit-system"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Document Edit System is down"
          description: "The service has been down for more than 1 minute"

      - alert: HighEditFailureRate
        expr: sum(rate(edits_failed_total[5m])) / clamp_min(sum(rate(edits_requested_total[5m])), 1e-9) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High edit failure rate"
          description: "Edit failure rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: HighEditLatencyP95
        expr: histogram_quantile(0.95, sum(rate(edit_request_duration_seconds_bucket[5m])) by (le)) > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High edit latency"
          description: "Edit workflow P95 latency is {{ $value }}s (threshold: 8s)"

      - alert: HighLLMErrorRate
        expr: sum(rate(llm_calls_total{status="error"}[5m])) / clamp_min(sum(rate(llm_calls_total[5m])), 1e-9) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM API error rate"
          description: "LLM error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: HighLLMLatencyP95
        expr: histogram_quantile(0.95, sum(rate(llm_call_duration_seconds_bucket[5m])) by (le, model, operation)) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High LLM latency"
          description: "LLM P95 latency is {{ $value }}s (threshold: 5s)"

      - alert: HighRetrievalLatencyP95
        expr: histogram_quantile(0.95, sum(rate(retrieval_duration_seconds_bucket[5m])) by (le, mode)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High retrieval latency"
          description: "RAG retrieval P95 latency is {{ $value }}s (threshold: 2s)"

      - alert: HighRetrievalEmptyRate
        expr: sum(rate(retrieval_requests_total{status="empty"}[5m])) / clamp_min(sum(rate(retrieval_requests_total{status=~"success|empty"}[5m])), 1e-9) > 0.4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High retrieval empty rate"
          description: "RAG empty rate is {{ $value | humanizePercentage }} (threshold: 40%)"

      - alert: HighWorkflowErrorRate
        expr: sum(rate(workflow_runs_total{status="error"}[5m])) / clamp_min(sum(rate(workflow_runs_total[5m])), 1e-9) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High workflow error rate"
          description: "Workflow error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      - alert: HighWorkflowLatencyP95
        expr: histogram_quantile(0.95, sum(rate(workflow_duration_seconds_bucket[5m])) by (le, workflow)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High workflow latency"
          description: "Workflow P95 latency is {{ $value }}s (threshold: 10s)"

      - alert: HighHttpErrorRate
        expr: sum(rate(errors_total[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error volume"
          description: "API error volume is {{ $value }} errors/sec (threshold: 0.2)"
